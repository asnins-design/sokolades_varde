
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Šokolādes Varde</title>

<style>
body {
    font-family: Bookman Old Style, times new roman;
    margin: 0;
    padding: 20px;
    background: #E2B3FF;
}

.layout {
  display: flex;
  gap: 10px;
}
    
.container {
    max-width: 700px;
    margin: auto;
}
.items-grid #items {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

h2 {
    text-align: center;
}

.item-row {
  background: white;
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);

  display: flex;
  flex-direction: column;
  gap: 5px;
}

.item-row img {
  width: 50px;
  height: 50px;
  object-fit: contain;
}

.item-name {
    flex: 1;
    font-size: 14px;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: url('https://cdn.cursors-4u.net/previews/harry-potter-magical-wand-ef2c54d6-32.webp') 32 32, auto !important;
    transition: 0.2s;
}

/* Magical buttons */
.add-btn {
    background: #E2B3FF;
    color: white;
}

.add-btn:hover {
    background: #5B8040;
}

.remove-btn {
    background: #dfe6e9;
}

.remove-btn:hover {
    background: #DE811D;
}

.action-btn {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    font-size: 18px;
    background: #00b894;
    color: white;
}

.action-btn:hover {
    background: #00997a;
}
.payment-box {
  margin-top: 10px;
  background: white;
  padding: 7px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);

  display: flex;
  flex-direction: column;  /* THIS forces one column */
  gap: 5px;               /* nice spacing */
  width: 100%;        /* keeps it compact */
}

.payment-box input {
  width: 50%;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

#change {
  font-size: 18px;
  margin-top: 5px;
  font-weight: bold;
  
}

#basket {
    width: 100%;
    margin-top: 15px;
    padding: 10px;
    background: white;
    border-radius: 10px;
    min-height: 50px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

#total {
    margin-top: 15px;
    font-weight: bold;
    text-align: left;
    font-size: 16px;
}

/* Mobile adjustments */
@media (max-width: 600px) {
    .item-row {
        flex-direction: column;
        align-items: flex-start;
    }

    .item-row img {
        margin-bottom: 8px;
    }

    button {
        width: 48%;
        margin-top: 5px;
    }
}
</style>
</head>



<!SEIT SAKAS ISTAIS KODS>

<div class="container">

  <h2>Šokolādes vardes kase</h2>

   <div class="items-grid">
    <div id="items"></div>
   </div>
    <!-- RIGHT SIDE -->


      <h3>Grozā šobrīd:</h3>
      <div id="basket"></div>

      <div id="total">Kopā jāmaksā: 0G 0S 0K</div>

      <div class="payment-box">
        <h3>Samaksāja:</h3>

        <input type="number" id="paidG" placeholder="Galeoni" min="0" oninput="calculateChange()">
        <input type="number" id="paidS" placeholder="Sirpi" min="0" oninput="calculateChange()">
        <input type="number" id="paidK" placeholder="Knutas" min="0" oninput="calculateChange()">

        <div id="change">
          Atlikums: 0G 0S 0K
        </div>
      </div>

      <button class="action-btn" style="background:#636e72;" onclick="resetBasket()">JAUNS PIRKUMS</button>

    </div>







<!FUNKCIJAS, SO NEAIZTIEKAM>




  
<script>
// Currency system
const KNUTAS_IN_SIRPS = 5;
const SIRPS_IN_GALEON = 5;
const KNUTAS_IN_GALEON = KNUTAS_IN_SIRPS * SIRPS_IN_GALEON;

function toKnutas(g=0,s=0,k=0){
    return g*KNUTAS_IN_GALEON + s*KNUTAS_IN_SIRPS + k;
}

function fromKnutas(total){
    const g = Math.floor(total / KNUTAS_IN_GALEON);
    const remainder = total % KNUTAS_IN_GALEON;
    const s = Math.floor(remainder / KNUTAS_IN_SIRPS);
    const k = remainder % KNUTAS_IN_SIRPS;
    return {g,s,k};
}

function formatMoney(knutas){
    const m = fromKnutas(knutas);
    return `${m.g}G ${m.s}S ${m.k}K`;
}

// Items with images
const items = {
    "Strupa apmetņu striķi": { price: toKnutas(0,2,3), image: "images/ceturtais.png" },
    "Sviedene": { price: toKnutas(0,0,4), image: "images/tresais.png" },
    "Hagrida Zizlis": { price: toKnutas(0,1,2), image: "images/tresais.png" },
    "Šokolādes varde": { price: toKnutas(0,3,0), image: "images/ceturtais.png" },
    "Mājas elfs": { price: toKnutas(1,2,3), image: "images/piektais.png" }
};

let basket = {};
let totalKnutas = 0;

for(let name in items){
    basket[name] = 0;
}

const itemsDiv = document.getElementById("items");

for(let name in items){
    const row = document.createElement("div");
    row.className = "item-row";

    const img = document.createElement("img");
    img.src = items[name].image;

    const label = document.createElement("div");
    label.className = "item-name";
    label.textContent = `${name} (${formatMoney(items[name].price)})`;

    const addBtn = document.createElement("button");
    addBtn.textContent = "+";
    addBtn.className = "add-btn";
    addBtn.onclick = () => addItem(name);

    const removeBtn = document.createElement("button");
    removeBtn.textContent = "-";
    removeBtn.className = "remove-btn";
    removeBtn.onclick = () => removeItem(name);

    const topRow = document.createElement("div");
    topRow.style.display = "flex";
    topRow.style.alignItems = "center";
    topRow.style.justifyContent = "space-between";
    topRow.style.width = "100%";

    const leftSide = document.createElement("div");
    leftSide.style.display = "flex";
    leftSide.style.alignItems = "center";
    leftSide.style.gap = "10px";

    const btnGroup = document.createElement("div");
    btnGroup.style.display = "flex";
    btnGroup.style.gap = "5px";

    leftSide.appendChild(img);

    btnGroup.appendChild(addBtn);
    btnGroup.appendChild(removeBtn);

    topRow.appendChild(leftSide);
    topRow.appendChild(btnGroup);

    row.appendChild(topRow);
    row.appendChild(label);

    itemsDiv.appendChild(row);
}


function addItem(name){
    basket[name]++;
    totalKnutas += items[name].price;
    updateDisplay();
}

function removeItem(name){
    if(basket[name] > 0){
        basket[name]--;
        totalKnutas -= items[name].price;
        updateDisplay();
    }
}

function updateDisplay(){
    const basketDiv = document.getElementById("basket");
    basketDiv.innerHTML = "";

    for(let name in basket){
        if(basket[name] > 0){
            const line = document.createElement("div");
            line.textContent = `${name} x${basket[name]}`;
            basketDiv.appendChild(line);
        }
    }

    document.getElementById("total").textContent =
        "Kopā jāmaksā: " + formatMoney(totalKnutas);
}
function calculateChange(){

    const g = parseInt(document.getElementById("paidG").value) || 0;
    const s = parseInt(document.getElementById("paidS").value) || 0;
    const k = parseInt(document.getElementById("paidK").value) || 0;

    const paid = toKnutas(g, s, k);

    if(paid < totalKnutas){
        const missing = totalKnutas - paid;
        document.getElementById("change").textContent =
            "Pietrūkst: " + formatMoney(missing);
        return;
    }

    const change = paid - totalKnutas;

    document.getElementById("change").textContent =
        "Atlikums: " + formatMoney(change);
}
function checkout(){
    if(totalKnutas === 0){
        alert("Nav izvēlēti produkti!");
        return;
    }

    let receipt = "Čeks\n\n";

    for(let name in basket){
        if(basket[name] > 0){
            const lineTotal = basket[name] * items[name].price;
            receipt += `${name} x${basket[name]} - ${formatMoney(lineTotal)}\n`;
        }
    }

    receipt += "\nKOPĀ: " + formatMoney(totalKnutas);

    alert(receipt);
}

function resetBasket(){
    totalKnutas = 0;

    for(let name in basket){
        basket[name] = 0;
    }

    updateDisplay();
    document.getElementById("paidG").value = "";
    document.getElementById("paidS").value = "";
    document.getElementById("paidK").value = "";

    document.getElementById("change").textContent = "Atlikums: 0G 0S 0K";
}
</script>

</body>
